<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#111111">
  <title>LOGI</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css">
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/modules/map.css">
  <link rel="stylesheet" href="assets/css/modules/plan.css">
</head>
<body>

  <header>
    <div class="header-inner">
      <span class="header-logo">LOGI</span>
      <span class="header-sub">Land Operations &amp; Groundfire Intelligence</span>
      <span id="header-status" class="header-status"></span>
    </div>
  </header>

  <div id="app">

    <!-- Left: map -->
    <div id="map-column">
      <div id="map"></div>
      <div id="unit-bar"></div>
      <div id="map-hint">Draw a burn unit boundary to begin.</div>
    </div>

    <!-- Right: burn plan document -->
    <div id="plan-column">
      <div id="burn-plan">
        <!-- Populated by plan.js -->
      </div>
      <div id="plan-footer">
        <button id="btn-print" class="btn-print">&#x2399; Print Plan</button>
      </div>
    </div>

  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>
  <script src="https://unpkg.com/@turf/turf@6.5.0/turf.min.js"></script>
  <script type="module" src="assets/js/app.js"></script>

</body>
</html>
